<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Maps - OpenStreetMap Prototype</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🗺️ John Maps</h1>
            <p>OpenStreetMap Prototype - Search by Postcode or Coordinates</p>
        </header>

        <main>
            <div class="search-section">
                <div class="form-group">
                    <label for="postcode">Postcode</label>
                    <input 
                        type="text" 
                        id="postcode" 
                        placeholder="e.g., SW1A 1AA"
                        autocomplete="off"
                    >
                    <small>Enter a UK postcode to find coordinates</small>
                </div>

                <div class="divider">or</div>

                <div class="form-group">
                    <label for="latitude">Latitude</label>
                    <input 
                        type="number" 
                        id="latitude" 
                        placeholder="e.g., 51.5074"
                        step="0.0001"
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label for="longitude">Longitude</label>
                    <input 
                        type="number" 
                        id="longitude" 
                        placeholder="e.g., -0.1278"
                        step="0.0001"
                        autocomplete="off"
                    >
                    <small>Enter coordinates to find postcode</small>
                </div>
            </div>

            <div id="address-display" class="address-display" style="display: none;">
                <p><strong>Address:</strong> <span id="address-text"></span></p>
            </div>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <div id="map" class="map"></div>
        </main>

        <footer>
            <p>Map data © <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors</p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
